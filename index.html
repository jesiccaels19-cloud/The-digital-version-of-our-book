<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our 1st Anniversary Book 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f7f3ed;
            font-family: 'Courier New', Courier, monospace;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- STYLE KUIS INTERAKTIF (DARK THEME) --- */
        #quiz-gate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            color: #00ff00;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }
        .quiz-box {
            background: #252525;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 480px;
            width: 100%;
            border: 1px solid #333;
            text-align: center;
        }
        .quiz-header {
            margin-bottom: 20px;
            font-size: 1.2rem;
            border-bottom: 1px dashed #00ff00;
            padding-bottom: 10px;
        }
        .question-text {
            color: #ffffff;
            font-size: 1.1rem;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .option-btn {
            background: #111;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95rem;
            text-align: left;
            transition: all 0.2s;
        }
        .option-btn:hover {
            background: #00ff00;
            color: #111;
        }
        #error-msg {
            color: #ff3333;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }

        /* --- STYLE SCRAPBOOK UTAMA --- */
        #main-content {
            width: 100%;
            display: none; /* Diatur ke none awal, diaktifkan lewat JS jika sukses kuis */
            flex-direction: column;
            align-items: center;
        }
        .music-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 15px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .book-container {
            max-width: 650px;
            width: 100%;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        .page-wrapper {
            background: #ffffff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .page-img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            display: block;
        }
        .footer-note {
            text-align: center;
            padding: 40px 0;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

    <!-- LAYER KUIS -->
    <div id="quiz-gate">
        <div class="quiz-box">
            <div class="quiz-header" id="quiz-progress">PROTOCOL STATUS: QUESTION 1 OF 3</div>
            <p class="question-text" id="question-content">Loading question...</p>
            
            <div class="options-container" id="options-block">
                <!-- Tombol pilihan ganda muncul otomatis -->
            </div>
            
            <p id="error-msg">❌ Akses ditolak. Jawabannya salah, coba pikirkan pakai logika!</p>
        </div>
    </div>

    <!-- KONTEN BUKU UTAMA -->
    <div id="main-content">
        <div class="music-container">
            <audio id="bg-music" controls loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
        </div>

        <div class="book-container">
            
            <!-- Cover Depan & Belakang -->
            <div class="page-wrapper">
                <img class="page-img" src="images/cover%20dan%20backcover.jpg" alt="Cover & Backcover">
            </div>

            <!-- Halaman 1 & 2 -->
            <div class="page-wrapper">
                <img class="page-img" src="images/page%201%20%26%202.jpg" alt="Page 1 & 2">
            </div>

            <!-- Halaman 3 & 4 -->
            <div class="page-wrapper">
                <img class="page-img" src="images/page%203%20%26%204.jpg" alt="Page 3 & 4">
            </div>

            <!-- Halaman 5 & 6 -->
            <div class="page-wrapper">
                <img class="page-img" src="images/page%205%20%26%206.jpg" alt="Page 5 & 6">
            </div>

            <!-- NOTE: Gue bikinin template otomatis di bawah sampai page 49 & 50 biar lo gak capek ngetik manual -->
            <div class="page-wrapper"><img class="page-img" src="images/page%207%20%26%208.jpg"></div>
            <div class="page-wrapper"><img class="page-img" src="images/page%209%20%26%2010.jpg"></div>
            <div class="page-wrapper"><img class="page-img" src="images/page%2011%20%26%2012.jpg"></div>
            <div class="page-wrapper"><img class="page-img" src="images/page%2013%20%26%2014.jpg"></div>
            <div class="page-wrapper"><img class="page-img" src="images/page%2015%20%26%2016.jpg"></div>
            <div class="page-wrapper"><img class="page-img" src="images/page%2017%20%26%2018.jpg"></div>
            <div class="page-wrapper"><img class="page-img" src="images/page%2019%20%26%2020.jpg"></div>
            <div class="page-wrapper"><img class="page-img" src="images/page%2021%20%26%2022.jpg"></div>
            <div class="page-wrapper"><img class="page-img" src="images/page%2023%20%26%2024.jpg"></div>
            <div class="page-wrapper"><img class="page-img" src="images/page%2025%20%26%2026.jpg"></div>
            <div class="page-wrapper"><img class="page-img" src="images/page%2027%20%26%2028.jpg"></div>
            <div class="page-wrapper"><img class="page-img" src="images/page%2029%20%26%2030.jpg"></div>
            <div class="page-wrapper"><img class="page-img" src="images/page%2031%20%26%2032.jpg"></div>
            <div class="page-wrapper"><img class="page-img" src="images/page%2033%20%26%2034.jpg"></div>
            <div class="page-wrapper"><img class="page-img" src="images/page%2035%20%26%2036.jpg"></div>
            <div class="page-wrapper"><img class="page-img" src="images/page%2037%20%26%2038.jpg"></div>
            <div class="page-wrapper"><img class="page-img" src="images/page%2039%20%26%2040.jpg"></div>
            <div class="page-wrapper"><img class="page-img" src="images/page%2041%20%26%2042.jpg"></div>
            <div class="page-wrapper"><img class="page-img" src="images/page%2043%20%26%2044.jpg"></div>
            <div class="page-wrapper"><img class="page-img" src="images/page%2045%20%26%2046.jpg"></div>
            <div class="page-wrapper"><img class="page-img" src="images/page%2047%20%26%2048.jpg"></div>
            
            <!-- Halaman Akhir -->
            <div class="page-wrapper">
                <img class="page-img" src="images/page%2049%20%26%2050.jpg" alt="Page 49 & 50">
            </div>

        </div>

        <div class="footer-note">
            <p>Made with ❤️ by Elsa | Happy Anniversary, Jojo ✨</p>
        </div>
    </div>

    <!-- LOGIKA JAVASCRIPT KUIS -->
    <script>
        var quizData = [
            {
                question: "Pas kita bagi Smiski couple sebelum ke Korea, bagian mana yang kamu simpen?",
                options: ["A. Sun (Matahari)", "B. Moon (Bulan)", "C. Star (Bintang)"],
                correct: 1
            },
            {
                question: "Barang apa yang paling sering aku lupain kalau kita lagi pergi bareng, sampai kamu sengaja bawain pas kita ke Bandung?",
                options: ["A. Dompet & ID Card", "B. Charger Laptop", "C. Sikat Gigi"],
                correct: 2
            },
            {
                question: "Di mata aku, kamu itu diibaratkan seperti minuman apa? (Yang manis, ada nutty-nya, tapi bikin selalu addicted)",
                options: ["A. Matcha Latte", "B. Hazelnut Latte", "C. Americano 100% Logic"],
                correct: 1
            }
        ];

        var currentQuestionIndex = 0;

        function loadQuestion() {
            var currentQuiz = quizData[currentQuestionIndex];
            document.getElementById("quiz-progress").innerText = "PROTOCOL STATUS: QUESTION " + (currentQuestionIndex + 1) + " OF " + quizData.length;
            document.getElementById("question-content").innerText = currentQuiz.question;
            
            var optionsBlock = document.getElementById("options-block");
            optionsBlock.innerHTML = "";
            
            currentQuiz.options.forEach(function(option, index) {
                var button = document.createElement("button");
                button.className = "option-btn";
                button.innerText = option;
                button.onclick = function() { selectAnswer(index); };
                optionsBlock.appendChild(button);
            });

            document.getElementById("error-msg").style.display = "none";
        }

        function selectAnswer(selectedIndex) {
            var currentQuiz = quizData[currentQuestionIndex];
            
            if (selectedIndex === currentQuiz.correct) {
                currentQuestionIndex++;
                
                if (currentQuestionIndex < quizData.length) {
                    loadQuestion();
                } else {
                    document.getElementById("quiz-gate").style.display = "none";
                    document.getElementById("main-content").style.display = "flex";
                    document.getElementById("bg-music").play();
                }
            } else {
                document.getElementById("error-msg").style.display = "block";
            }
        }

        window.onload = function() {
            loadQuestion();
        };
    </script>

</body>
</html>
